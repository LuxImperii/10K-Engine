<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quark Cascade • Level 2</title>
  <style>
    body {
      margin: 0;
      background: #05050f;
      color: #88eeff;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 20px;
      right: 30px;
      text-align: right;
      pointer-events: none;
    }

    .stat {
      font-size: 1.5em;
      margin: 6px 0;
      text-shadow: 0 0 12px #88eeff;
    }

    #controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: all;
    }

    button {
      background: rgba(10, 15, 40, 0.9);
      border: 2px solid #44ddff;
      color: #bbffff;
      padding: 14px 28px;
      font-size: 1.15em;
      cursor: pointer;
      border-radius: 6px;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      border-color: #226688;
    }
  </style>
</head>

<body>

  <canvas id="canvas"></canvas>

  <div id="hud">
    <div class="stat">Total Charge: <span id="total" style="color:#ffee88">0</span></div>
    <div class="stat">Unstable Quarks: <span id="staked" style="color:#ff88cc">0</span></div>
  </div>

  <div id="controls">
    <button id="btn-roll">COLLIDE (Roll)</button>
    <button id="btn-take" disabled>DETECT &amp; COLLAPSE (Score Selected)</button>
    <button id="btn-bank" disabled>STABILIZE (Bank)</button>

    <!-- Debug add buttons -->
    <button id="btn-add100" style="display:none;">+100</button>
    <button id="btn-add1000" style="display:none;">+1000</button>
  </div>

  <script type="module">
    import { createGame, roll, take, bank } from './game.js';
    import { CONFIG } from './config.js';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let game = createGame();
    let selectedIndexes = new Set();

    let nodes = [];
    let ambientParticles = [];
    let farkleFlash = 0;
    let farkleShake = 0;

    let width, height, centerX, centerY;
    let mouseX = 0, mouseY = 0;

    let energyBurst = null;
    let burstFlash = 0;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      centerX = width / 2;
      centerY = height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    });

    function createAmbientParticles(count = 8) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        ambientParticles.push({
          x: centerX + (Math.random() - 0.5) * 400,
          y: centerY + (Math.random() - 0.5) * 300,
          vx: Math.cos(angle) * 0.6,
          vy: Math.sin(angle) * 0.6,
          life: 100 + Math.random() * 300,
          hue: 200 + Math.random() * 60,
          alpha: 0.3
        });
      }
    }

    function updateAmbientParticles() {
      for (let i = ambientParticles.length - 1; i >= 0; i--) {
        const p = ambientParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.alpha = p.life / 250;
        if (p.life <= 0) ambientParticles.splice(i, 1);
      }
    }

    function drawBackground() {
      ctx.fillStyle = '#05050f';
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = 'rgba(70, 110, 180, 0.06)';
      for (let x = 40; x < width; x += 80) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
      }
      for (let y = 40; y < height; y += 80) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
      }
    }

    function drawNodes() {
      nodes.forEach(node => {
        const isSelected = selectedIndexes.has(node.index);

        const PULSE_SPEED = 8;
        const pulse = Math.sin(Date.now() / PULSE_SPEED) * 0.05 + 1.0;

        let targetX = node.baseX;
        let targetY = node.baseY;

        if (!isSelected) {
          const dx = mouseX - node.baseX;
          const dy = mouseY - node.baseY;
          const dist = Math.hypot(dx, dy);

          if (dist > 8) {
            const leash = Math.min(50, dist);
            const factor = leash / dist;
            targetX = node.baseX + dx * factor * 0.82;
            targetY = node.baseY + dy * factor * 0.82;
          }
        }

        node.x = node.x * 0.78 + targetX * 0.22;
        node.y = node.y * 0.78 + targetY * 0.22;

        const isWarm = (node.face === 1 || node.face === 5);
        const baseHue = isWarm ? (node.face === 1 ? 25 : 12) : (node.face * 42);

        ctx.shadowBlur = isSelected ? 70 : 50;
        ctx.shadowColor = isSelected
          ? (isWarm ? '#ffdd88' : '#88eeff')
          : `hsl(${baseHue}, 90%, 75%)`;

        ctx.fillStyle = isSelected
          ? `hsla(${baseHue}, 100%, 92%, 0.95)`
          : `hsla(${baseHue}, 85%, 78%, ${node.alpha * 0.75})`;

        ctx.save();
        ctx.translate(node.x, node.y);

        ctx.shadowBlur = isSelected ? 55 : 20;
        ctx.beginPath();
        ctx.arc(0, 0, isSelected ? 24 * pulse : 19 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 150;
        ctx.fillStyle = '#111122';
        ctx.beginPath();
        ctx.arc(0, 0, 7, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = isWarm ? '#ffeebb' : '#bbffee';
        ctx.font = 'bold 15px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.face, 0, 1);

        ctx.restore();
      });
    }

    function drawAmbientParticles() {
      ctx.shadowBlur = 6;
      ambientParticles.forEach(p => {
        ctx.fillStyle = `hsla(${p.hue}, 70%, 85%, ${p.alpha})`;
        ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
      });
    }

    function drawCore() {
      const staked = game.state.handScore;
      const total = game.state.totalScore;

      let flashIntensity = 0;
      let shake = 0;

      if (farkleFlash > 0) {
        flashIntensity = Math.sin(farkleFlash / 2.2) * 0.9 + 0.1;
        shake = Math.sin(farkleFlash * 8) * 6 * (farkleFlash / 52);
        farkleFlash--;
      }

      if (energyBurst && energyBurst.active) {
        const dx = centerX - energyBurst.x;
        const dy = centerY - energyBurst.y;
        const dist = Math.hypot(dx, dy);

        if (dist > 35) {
          const speed = 50;
          energyBurst.x += (dx / dist) * speed;
          energyBurst.y += (dy / dist) * speed;
        } else {
          burstFlash = 26;
          energyBurst.active = false;

          for (let i = 0; i < 55; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 5 + Math.random() * 9;
            ambientParticles.push({
              x: centerX,
              y: centerY,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 35 + Math.random() * 25,
              hue: 50,
              alpha: 1
            });
          }
        }

        ctx.shadowBlur = 50;
        ctx.shadowColor = '#ff0099';
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(energyBurst.x - 6, energyBurst.y - 6, 4, 4);
      }

      if (burstFlash > 0) {
        ctx.shadowBlur = 120;
        ctx.fillStyle = `rgba(155, 155, 155, ${burstFlash / 18})`;
        ctx.beginPath();
        ctx.arc(centerX, centerY, 45 + burstFlash * 2, 0, Math.PI * 2);
        ctx.fill();
        burstFlash--;
      }

      const SHROUD_MIN_RADIUS = 10;
      const SHROUD_GROWTH_RATE = 60;
      const PULSE_SPEED = 1;
      const PULSE_AMPLITUDE = 2;
      const PARTICLE_BASE_SIZE = 4;
      const PARTICLE_WOBBLE = 50;
      const ORBIT_ADD_FREQUENCY = 1000;
      const ORBIT_SCALE_PER_LEVEL = 0.30;
      const COMPLEXITY_ADD_FREQUENCY = 1000;
      const PARTICLE_SPEED = 200;

      const outerRadius = SHROUD_MIN_RADIUS + Math.max(0, staked / 300) * SHROUD_GROWTH_RATE;
      const basePulse = Math.sin(Date.now() / PULSE_SPEED) * PULSE_AMPLITUDE;

      ctx.shadowBlur = 90 + flashIntensity * 60;
      ctx.shadowColor = farkleFlash > 0 ? '#ff2222' : '#ff88dd';
      ctx.fillStyle = `hsla(310, 85%, 72%, ${0.18 + staked / 2000 + flashIntensity * 0.55})`;
      ctx.beginPath();
      ctx.arc(centerX + shake, centerY + shake * 0.6, outerRadius + basePulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 25;

      const particleCount = Math.floor(total / 100);
      const baseComplexity = Math.max(1, Math.floor(total / COMPLEXITY_ADD_FREQUENCY));
      const orbitCount = Math.floor(total / ORBIT_ADD_FREQUENCY) + 1;

      for (let orbit = 0; orbit < orbitCount; orbit++) {
        const orbitComplexity = baseComplexity + orbit;
        const orbitScale = 1 + orbit * ORBIT_SCALE_PER_LEVEL;

        for (let i = 0; i < particleCount; i++) {
          const phaseOffset = i * 0.7 + orbit * 1.3;
          const a = Date.now() / PARTICLE_SPEED + phaseOffset;

          const r = PARTICLE_BASE_SIZE * orbitScale + Math.sin(a * orbitComplexity) * PARTICLE_WOBBLE;
          const x = centerX + Math.cos(a) * r + shake * 0.8;
          const y = centerY + Math.sin(a) * r * 0.75 + shake * 0.4;

          ctx.fillStyle = farkleFlash > 0 ? '#ff6666' : `hsla(200, 90%, 95%, 0.95)`;
          ctx.fillRect(x - 1.8, y - 1.8, 3.6, 3.6);
        }
      }

      if (farkleFlash > 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = `rgba(255, 60, 60, ${flashIntensity})`;
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("CORE COLLAPSE", centerX + shake * 1.2, centerY - 95);
      }
    }

    function triggerEnergyBurst() {
      const side = Math.floor(Math.random() * 4);
      let startX, startY;

      if (side === 0) { startX = -60; startY = Math.random() * height; }
      else if (side === 1) { startX = width + 60; startY = Math.random() * height; }
      else if (side === 2) { startX = Math.random() * width; startY = -60; }
      else { startX = Math.random() * width; startY = height + 60; }

      energyBurst = {
        x: startX,
        y: startY,
        life: 120,
        active: true
      };
    }

    function arrangeNodesInCircle() {
      nodes = [];
      const dice = game.state.dice;
      if (!dice || dice.length === 0) return;

      const count = dice.length;
      const radius = Math.min(width, height) * 0.34;

      dice.forEach((face, i) => {
        const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius * 0.88;

        nodes.push({
          index: i,
          x, y,
          baseX: x,
          baseY: y,
          face: face,
          alpha: 1
        });
      });
    }

    function render() {
      drawBackground();
      drawCore();
      drawNodes();
      drawAmbientParticles();
      updateAmbientParticles();
      requestAnimationFrame(render);
    }

    function updateUI() {
      document.getElementById('total').textContent = game.state.totalScore;
      document.getElementById('staked').textContent = game.state.handScore;
      document.getElementById('btn-bank').disabled = game.state.handScore < CONFIG.minBank;
      document.getElementById('btn-roll').disabled = !game.canRoll;
      document.getElementById('btn-take').disabled = selectedIndexes.size === 0;
    }

    // ROLL
    document.getElementById('btn-roll').addEventListener('click', () => {
      if (!game.canRoll) return;
      triggerEnergyBurst();

      setTimeout(() => {
        game = roll(game);
        selectedIndexes.clear();

        arrangeNodesInCircle();
        createAmbientParticles(12);

        if (game.state.dice.length === 0) {
          farkleFlash = 52;
        }
        updateUI();
      }, 420);
    });

    // Click to toggle selection
    canvas.addEventListener('click', (e) => {
      if (game.state.dice.length === 0) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      for (let node of nodes) {
        const d = Math.hypot(mx - node.x, my - node.y);
        if (d < 35) {
          selectedIndexes.has(node.index)
            ? selectedIndexes.delete(node.index)
            : selectedIndexes.add(node.index);
          updateUI();
          return;
        }
      }
    });

    // TAKE
    document.getElementById('btn-take').addEventListener('click', () => {
      const indices = Array.from(selectedIndexes);
      if (indices.length === 0) return;

      game = take(game, indices);
      selectedIndexes.clear();
      arrangeNodesInCircle();
      updateUI();
    });

    // BANK
    document.getElementById('btn-bank').addEventListener('click', () => {
      if (game.state.handScore >= CONFIG.minBank) {
        game = bank(game);
        arrangeNodesInCircle();
        updateUI();
      }
    });

    // Debug add buttons + "=" key toggle
    const btnAdd100 = document.getElementById('btn-add100');
    const btnAdd1000 = document.getElementById('btn-add1000');
    let debugButtonsVisible = false;

    btnAdd100.addEventListener('click', () => {
      game.state.totalScore += 100;
      updateUI();
    });

    btnAdd1000.addEventListener('click', () => {
      game.state.totalScore += 1000;
      updateUI();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === "=" || e.key === "+") {
        debugButtonsVisible = !debugButtonsVisible;
        btnAdd100.style.display = debugButtonsVisible ? 'inline-block' : 'none';
        btnAdd1000.style.display = debugButtonsVisible ? 'inline-block' : 'none';
      }
    });

    // Init
    selectedIndexes.clear();
    nodes = [];
    farkleFlash = 0;
    updateUI();
    createAmbientParticles(20);
    render();

    console.log("%cQuark Cascade • Now running on new game + engine layer", "color:#ff6666; font-size:16px");
  </script>
</body>

</html>
